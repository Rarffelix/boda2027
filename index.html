<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo & Denisse - Nuestra Boda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bodas-oro': '#C5A059',
                        'bodas-crema': '#F9F7F2',
                        'bodas-oscuro': '#2D2926',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-bodas-crema text-bodas-oscuro font-sans">

    <section class="relative h-screen flex items-center justify-center text-white overflow-hidden bg-bodas-crema">
        <div class="absolute inset-0 z-0">
            <img src="foto-boda.jpg" class="w-full h-full object-cover object-center md:object-contain" alt="Ricardo & Denisse">
            <div class="absolute inset-0 bg-black/40"></div>
        </div>
        
        <div class="relative z-10 text-center px-4 w-full">
            <p class="uppercase tracking-[0.3em] text-xs mb-4">¡Nos Casamos!</p>
            <h1 class="font-serif text-5xl md:text-8xl mb-6 italic leading-tight">
                Ricardo <span class="block md:inline-block text-bodas-oro md:text-white">&</span> Denisse
            </h1>
            <div class="w-12 h-[1px] bg-white mx-auto mb-6"></div>
            <p class="text-lg md:text-2xl font-light tracking-[0.3em]">06 . MARZO . 2027</p>
        </div>
    </section>

    <section class="py-20 px-6 max-w-2xl mx-auto">
        <div class="glass p-10 rounded-[3rem] shadow-xl text-center border border-white/50">
            <h2 class="font-serif text-4xl mb-4 italic text-bodas-oro">¿Nos acompañas?</h2>
            <p class="text-gray-500 mb-8 font-light">Confirma tu asistencia directamente a nuestro WhatsApp.</p>
            
            <form id="whatsappForm" class="space-y-6 text-left">
                <div>
                    <label class="text-[10px] uppercase tracking-[0.2em] ml-2 font-semibold text-gray-400">Nombre Completo</label>
                    <input type="text" id="input_nombre" class="w-full bg-transparent border-b border-gray-300 focus:border-bodas-oro outline-none py-3 px-2 transition-all font-light" required>
                </div>
                
                <div>
                    <label class="text-[10px] uppercase tracking-[0.2em] ml-2 font-semibold text-gray-400">¿Asistirás?</label>
                    <select id="input_asistencia" class="w-full bg-transparent border-b border-gray-300 focus:border-bodas-oro outline-none py-3 px-2 transition-all font-light">
                        <option value="¡Sí, ahí estaremos!">¡Sí, con mucho gusto!</option>
                        <option value="Lo sentimos, no podremos asistir">No podré asistir</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] uppercase tracking-[0.2em] ml-2 font-semibold text-gray-400">Mensaje especial o alergias</label>
                    <textarea id="input_mensaje" class="w-full bg-transparent border-b border-gray-300 focus:border-bodas-oro outline-none py-3 px-2 transition-all font-light h-20 resize-none"></textarea>
                </div>

                <button type="button" onclick="enviarConfirmacion()" class="w-full bg-bodas-oscuro text-white py-5 rounded-full hover:bg-bodas-oro transition-all duration-500 tracking-[0.2em] uppercase text-xs font-bold mt-4 shadow-md">
                    Confirmar por WhatsApp
                </button>
            </form>
        </div>
    </section>

    <script>
        function enviarConfirmacion() {
            const nombre = document.getElementById('input_nombre').value;
            const asistencia = document.getElementById('input_asistencia').value;
            const mensajeExtra = document.getElementById('input_mensaje').value;
            
            if (nombre.trim() === "") {
                alert("Por favor, ingresa tu nombre");
                return;
            }

            // REEMPLAZA ESTO POR TU NÚMERO (Ejemplo: 526441234567)
            const miTelefono = "526441413170"; 

            const texto = `¡Hola! 💍%0A*Confirmación de Boda*%0A%0A*Nombre:* ${nombre}%0A*Asistencia:* ${asistencia}%0A*Notas:* ${mensajeExtra || 'Sin notas'}`;
            const url = "https://api.whatsapp.com/send?phone=" + miTelefono + "&text=" + texto;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
